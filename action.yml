name: "webppipe"
description: "Optimize images in a repository by converting PNG/JPEG to WebP and committing the result."
author: "Valentin Kaiser"
branding:
  icon: "image"
  color: "blue"

inputs:
  quality:
    description: "WebP quality (1-100). Ignored when lossless is true."
    required: false
    default: "80"
  lossless:
    description: "Use lossless WebP encoding."
    required: false
    default: "false"
  max-width:
    description: "Maximum image width in pixels (0 = unlimited)."
    required: false
    default: "0"
  max-height:
    description: "Maximum image height in pixels (0 = unlimited)."
    required: false
    default: "0"
  include:
    description: "Comma-separated glob patterns of files to include."
    required: false
    default: "**/*.png,**/*.jpg,**/*.jpeg,**/*.PNG,**/*.JPG,**/*.JPEG"
  exclude:
    description: "Comma-separated glob patterns of files to exclude."
    required: false
    default: ".git/**,node_modules/**,vendor/**"
  keep-originals:
    description: "Keep original files alongside the generated .webp files. Set to 'false' to replace originals."
    required: false
    default: "true"
  dry-run:
    description: "Report planned conversions without writing files."
    required: false
    default: "false"
  concurrency:
    description: "Number of parallel conversion workers (0 = NumCPU)."
    required: false
    default: "0"
  repo-path:
    description: "Path to the repository / working directory."
    required: false
    default: "."
  commit:
    description: "Commit converted files."
    required: false
    default: "true"
  push:
    description: "Push the commit to the remote."
    required: false
    default: "true"
  commit-message:
    description: "Commit message for converted files."
    required: false
    default: "[GEN] optimize images to WebP"
  author-name:
    description: "Git author name used for the commit."
    required: false
    default: "webppipe[bot]"
  author-email:
    description: "Git author email used for the commit."
    required: false
    default: "webppipe@users.noreply.github.com"
  branch:
    description: "Branch to push to (empty = current branch)."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Convert images to WebP
      shell: bash
      run: |
        docker build -t webppipe:action "${{ github.action_path }}"
        docker run --rm \
          --user "$(id -u):$(id -g)" \
          -v "${{ github.workspace }}:/github/workspace" \
          -w /github/workspace \
          -e WEBPPIPE_QUALITY="${{ inputs.quality }}" \
          -e WEBPPIPE_LOSSLESS="${{ inputs.lossless }}" \
          -e WEBPPIPE_MAX_WIDTH="${{ inputs.max-width }}" \
          -e WEBPPIPE_MAX_HEIGHT="${{ inputs.max-height }}" \
          -e WEBPPIPE_INCLUDE="${{ inputs.include }}" \
          -e WEBPPIPE_EXCLUDE="${{ inputs.exclude }}" \
          -e WEBPPIPE_KEEP_ORIGINALS="${{ inputs.keep-originals }}" \
          -e WEBPPIPE_DRY_RUN="${{ inputs.dry-run }}" \
          -e WEBPPIPE_CONCURRENCY="${{ inputs.concurrency }}" \
          -e WEBPPIPE_REPO_PATH="${{ inputs.repo-path }}" \
          -e WEBPPIPE_GIT_ENABLED="false" \
          webppipe:action

    - name: Commit and push converted images
      if: ${{ inputs.commit == 'true' && inputs.dry-run != 'true' }}
      shell: bash
      run: |
        git config --local user.name "${{ inputs.author-name }}"
        git config --local user.email "${{ inputs.author-email }}"
        git add -A
        git commit -m "${{ inputs.commit-message }}" || echo "No changes to commit"
        if [[ "${{ inputs.push }}" == "true" ]]; then
          BRANCH="${{ inputs.branch }}"
          git push origin "HEAD:${BRANCH:-$(git rev-parse --abbrev-ref HEAD)}"
        fi
